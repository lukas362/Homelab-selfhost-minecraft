# This will install docker (and other docker related stuff) and make it functional by adding GPG keys and make sure it is running and working
---
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Ensure apt dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true
  when: ansible_os_family == "Debian"

- name: Derive Docker apt architecture
  ansible.builtin.set_fact:
    docker_apt_architecture: "{{ docker_arch_map.get(ansible_architecture, 'amd64') }}"
  vars:
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
  when: ansible_os_family == "Debian"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_architecture }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install Docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Ensure containerd service is enabled and running
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started

- name: Set user to add into docker group
  ansible.builtin.set_fact:
    docker_manage_user: "{{ docker_user | default(ansible_env.SUDO_USER | default(ansible_user_id, true), true) }}"

- name: Add target user to docker group
  ansible.builtin.user:
    name: "{{ docker_manage_user }}"
    groups: docker
    append: true
  when:
    - docker_manage_user is defined
    - docker_manage_user | length > 0
    - docker_manage_user != "root"

- name: Verify Docker CLI is installed
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Show Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"
